<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>음표 맞추기 퀴즈</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #eef2f7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        h1 {
            font-size: 1.65rem;
            font-weight: 700;
            color: #2d3748;
        }

        .score {
            background: #fff;
            border-radius: 999px;
            padding: 7px 28px;
            font-size: 0.95rem;
            color: #718096;
            box-shadow: 0 1px 6px rgba(0,0,0,0.1);
        }
        .score b { color: #3182ce; font-size: 1.1rem; }

        .combo {
            background: #fff;
            border-radius: 999px;
            padding: 7px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            box-shadow: 0 1px 6px rgba(0,0,0,0.1);
            display: none;
        }
        .combo.show { display: block; }
        .combo.c2  { color: #2b6cb0; }
        .combo.c5  { color: #c05621; }
        .combo.c10 { color: #c53030; font-weight: 800; }

        .card {
            background: #fff;
            border-radius: 18px;
            padding: 22px 28px 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        #staff-svg { display: block; }

        @keyframes noteIn {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .ngrp { animation: noteIn 0.22s ease-out; }

        /* Timer bar */
        .timer-wrap {
            width: 490px;
            height: 10px;
            background: #e2e8f0;
            border-radius: 99px;
            overflow: hidden;
        }
        .timer-bar {
            height: 100%;
            border-radius: 99px;
            transition: width 0.1s linear, background-color 0.4s ease;
            background: #48bb78;
        }
        .timer-bar.danger { background: #f56565; }

        .feedback {
            font-size: 1.05rem;
            font-weight: 600;
            min-height: 34px;
            line-height: 34px;
            padding: 0 20px;
            border-radius: 8px;
            text-align: center;
            transition: background 0.2s, color 0.2s;
        }
        .feedback.correct { color: #22543d; background: #c6f6d5; }
        .feedback.wrong   { color: #742a2a; background: #fed7d7; }

        /* ── Piano ─────────────────────────────── */
        .piano {
            position: relative;
            height: 145px;
            filter: drop-shadow(0 6px 16px rgba(0,0,0,0.22));
            /* width set by JS */
        }

        .key {
            position: absolute;
            top: 0;
            border-radius: 0 0 8px 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            transition: background 0.07s, transform 0.07s, border-color 0.15s;
            user-select: none;
            -webkit-user-select: none;
        }

        /* White keys */
        .key.white {
            width: 38px;
            height: 145px;
            background: linear-gradient(to bottom, #f5f5f5, #ffffff);
            border: 1px solid #c8c8c8;
            border-bottom-width: 4px;
            z-index: 1;
            padding-bottom: 8px;
            gap: 2px;
        }
        .key.white:hover { background: linear-gradient(to bottom, #dbeafe, #eff6ff); }
        .key.white:active {
            transform: translateY(2px);
            background: linear-gradient(to bottom, #bfdbfe, #dbeafe);
        }
        .key.white .solfege {
            font-size: 0.85rem;
            font-weight: 700;
            color: #4a5568;
        }
        .key.white .note-id {
            font-size: 0.65rem;
            color: #a0aec0;
            font-weight: 500;
        }

        /* Black keys */
        .key.black {
            width: 22px;
            height: 88px;
            background: linear-gradient(to bottom, #1a1a1a, #3a3a3a);
            border: 1px solid #111;
            border-bottom-width: 3px;
            z-index: 2;
            padding-bottom: 5px;
            gap: 1px;
        }
        .key.black:hover  { background: linear-gradient(to bottom, #2a3a5a, #3a4a6a); }
        .key.black:active {
            transform: translateY(2px);
            background: linear-gradient(to bottom, #3a4a7a, #4a5a8a);
        }
        .key.black .note-id {
            font-size: 0.44rem;
            color: #ccc;
            font-weight: 500;
            line-height: 1.4;
            text-align: center;
        }

        /* Correct / Wrong states */
        .key.correct {
            background: linear-gradient(to bottom, #9ae6b4, #c6f6d5) !important;
            border-color: #38a169 !important;
        }
        .key.wrong {
            background: linear-gradient(to bottom, #fc8181, #fed7d7) !important;
            border-color: #e53e3e !important;
        }
        .key.white.correct .solfege,
        .key.white.correct .note-id { color: #22543d; }
        .key.white.wrong   .solfege,
        .key.white.wrong   .note-id { color: #742a2a; }
        .key.black.correct .note-id { color: #22543d; }
        .key.black.wrong   .note-id { color: #742a2a; }

        /* ── Settings ──────────────────────────── */
        .settings-wrap {
            position: fixed;
            top: 18px;
            right: 22px;
            z-index: 100;
        }
        .settings-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #fff;
            border: 1.5px solid #e2e8f0;
            border-radius: 999px;
            padding: 6px 14px;
            font-size: 0.9rem;
            color: #4a5568;
            cursor: pointer;
            box-shadow: 0 1px 6px rgba(0,0,0,0.1);
            transition: background 0.15s, border-color 0.15s;
            user-select: none;
        }
        .settings-btn:hover { background: #f7fafc; border-color: #cbd5e0; }
        .settings-btn .gear { font-size: 1rem; }
        .settings-btn .cur-label { font-weight: 600; color: #3182ce; }

        .settings-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: #fff;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            overflow: hidden;
            min-width: 120px;
        }
        .settings-dropdown.open { display: block; }

        .dropdown-item {
            padding: 10px 18px;
            font-size: 0.9rem;
            color: #4a5568;
            cursor: pointer;
            transition: background 0.1s;
        }
        .dropdown-item:hover { background: #ebf4ff; }
        .dropdown-item.active {
            background: #ebf4ff;
            color: #2b6cb0;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="settings-wrap">
    <div class="settings-btn" id="settings-btn">
        <span class="gear">⚙</span>
        <span class="cur-label" id="cur-label">5초</span>
    </div>
    <div class="settings-dropdown" id="settings-dropdown">
        <div class="dropdown-item active" data-sec="5">5초</div>
        <div class="dropdown-item"        data-sec="7">7초</div>
        <div class="dropdown-item"        data-sec="10">10초</div>
        <div class="dropdown-item"        data-sec="0">OFF</div>
    </div>
</div>

<h1>🎵 음표 맞추기</h1>

<div style="display:flex; gap:10px; align-items:center;">
    <div class="score">점수: <b id="sc">0</b> / <b id="tot">0</b></div>
    <div class="combo" id="combo"></div>
</div>

<div class="timer-wrap"><div class="timer-bar" id="timer-bar"></div></div>

<div class="card">
    <!--
        Staff lines (y): F5=55, D5=75, B4=95, G4=115, E4=135
        White note y positions (10px/step):
          B5=25  A5=35  G5=45  F5=55  E5=65  D5=75  C5=85
          B4=95  A4=105 G4=115 F4=125 E4=135 D4=145 C4=155
        Black notes share y with their letter name (C#=C pos, Db=D pos, etc.)
        Ledger lines: y≥155 → ledger at 155 ; y≤35 → ledger at 35
    -->
    <svg id="staff-svg" viewBox="0 0 490 220" width="490" height="220"
         xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<div class="feedback" id="fb"></div>

<div class="piano" id="piano"></div>

<script>
/* ── Note data ─────────────────────────────────────────────── */

const WHITE_NOTES = [
    { id:'C4', label:'도', y:155, acc:null, keyId:'C4' },
    { id:'D4', label:'레', y:145, acc:null, keyId:'D4' },
    { id:'E4', label:'미', y:135, acc:null, keyId:'E4' },
    { id:'F4', label:'파', y:125, acc:null, keyId:'F4' },
    { id:'G4', label:'솔', y:115, acc:null, keyId:'G4' },
    { id:'A4', label:'라', y:105, acc:null, keyId:'A4' },
    { id:'B4', label:'시', y: 95, acc:null, keyId:'B4' },
    { id:'C5', label:'도', y: 85, acc:null, keyId:'C5' },
    { id:'D5', label:'레', y: 75, acc:null, keyId:'D5' },
    { id:'E5', label:'미', y: 65, acc:null, keyId:'E5' },
    { id:'F5', label:'파', y: 55, acc:null, keyId:'F5' },
    { id:'G5', label:'솔', y: 45, acc:null, keyId:'G5' },
    { id:'A5', label:'라', y: 35, acc:null, keyId:'A5' },
    { id:'B5', label:'시', y: 25, acc:null, keyId:'B5' },
];

// Sharp and flat variants of each black key.
// Note head y = position of the letter name (C#4 sits on C4's line, Db4 on D4's line).
const BLACK_NOTES = [
    { id:'C#4', y:155, acc:'sharp', keyId:'Cs4' },
    { id:'D♭4', y:145, acc:'flat',  keyId:'Cs4' },
    { id:'D#4', y:145, acc:'sharp', keyId:'Ds4' },
    { id:'E♭4', y:135, acc:'flat',  keyId:'Ds4' },
    { id:'F#4', y:125, acc:'sharp', keyId:'Fs4' },
    { id:'G♭4', y:115, acc:'flat',  keyId:'Fs4' },
    { id:'G#4', y:115, acc:'sharp', keyId:'Gs4' },
    { id:'A♭4', y:105, acc:'flat',  keyId:'Gs4' },
    { id:'A#4', y:105, acc:'sharp', keyId:'As4' },
    { id:'B♭4', y: 95, acc:'flat',  keyId:'As4' },
    { id:'C#5', y: 85, acc:'sharp', keyId:'Cs5' },
    { id:'D♭5', y: 75, acc:'flat',  keyId:'Cs5' },
    { id:'D#5', y: 75, acc:'sharp', keyId:'Ds5' },
    { id:'E♭5', y: 65, acc:'flat',  keyId:'Ds5' },
    { id:'F#5', y: 55, acc:'sharp', keyId:'Fs5' },
    { id:'G♭5', y: 45, acc:'flat',  keyId:'Fs5' },
    { id:'G#5', y: 45, acc:'sharp', keyId:'Gs5' },
    { id:'A♭5', y: 35, acc:'flat',  keyId:'Gs5' },
    { id:'A#5', y: 35, acc:'sharp', keyId:'As5' },
    { id:'B♭5', y: 25, acc:'flat',  keyId:'As5' },
];

const ALL_NOTES = [...WHITE_NOTES, ...BLACK_NOTES];

// Black key piano key definitions: whiteLeft = index of left neighboring white key
const BLACK_KEY_DEFS = [
    { keyId:'Cs4', sharp:'C#4', flat:'D♭4', whiteLeft: 0 },
    { keyId:'Ds4', sharp:'D#4', flat:'E♭4', whiteLeft: 1 },
    { keyId:'Fs4', sharp:'F#4', flat:'G♭4', whiteLeft: 3 },
    { keyId:'Gs4', sharp:'G#4', flat:'A♭4', whiteLeft: 4 },
    { keyId:'As4', sharp:'A#4', flat:'B♭4', whiteLeft: 5 },
    { keyId:'Cs5', sharp:'C#5', flat:'D♭5', whiteLeft: 7 },
    { keyId:'Ds5', sharp:'D#5', flat:'E♭5', whiteLeft: 8 },
    { keyId:'Fs5', sharp:'F#5', flat:'G♭5', whiteLeft:10 },
    { keyId:'Gs5', sharp:'G#5', flat:'A♭5', whiteLeft:11 },
    { keyId:'As5', sharp:'A#5', flat:'B♭5', whiteLeft:12 },
];

const WHITE_W = 38;                          // white key width px
const BLACK_W = 22;                          // black key width px
const STAFF_Y = [55, 75, 95, 115, 135];
const NS = 'http://www.w3.org/2000/svg';

let cur = null, sc = 0, tot = 0, ok = true, combo = 0;

/* ── Timer ─────────────────────────────────────────────────── */
const TICK_MS = 50;
let settingSec  = 5;   // chosen in settings (applies next question)
let timerSec    = 5;   // active for current question
let timerInterval = null;
let timeLeft = 5;

function startTimer() {
    clearInterval(timerInterval);
    timerSec = settingSec;

    const wrap = document.querySelector('.timer-wrap');
    if (timerSec === 0) {
        wrap.style.visibility = 'hidden';
        return;
    }

    wrap.style.visibility = 'visible';
    timeLeft = timerSec;
    renderTimer();
    timerInterval = setInterval(() => {
        timeLeft = Math.max(0, timeLeft - TICK_MS / 1000);
        renderTimer();
        if (timeLeft === 0) timeout();
    }, TICK_MS);
}

function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
}

function renderTimer() {
    const bar = document.getElementById('timer-bar');
    bar.style.width = (timeLeft / timerSec * 100) + '%';
    bar.classList.toggle('danger', timeLeft <= 2);
}

function timeout() {
    if (!ok) return;
    ok = false;
    stopTimer();
    document.getElementById('tot').textContent = ++tot;
    document.querySelector(`[data-keyid="${cur.keyId}"]`).classList.add('correct');
    const fb = document.getElementById('fb');
    fb.textContent = `⏰ 시간 초과! 정답은 ${cur.id}`;
    fb.className = 'feedback wrong';
    combo = 0;
    renderCombo();
    setTimeout(next, 1500);
}

function renderCombo() {
    const el = document.getElementById('combo');
    if (combo < 2) { el.className = 'combo'; return; }
    el.textContent = `🔥 ${combo} 콤보!`;
    el.className = 'combo show ' + (combo >= 10 ? 'c10' : combo >= 5 ? 'c5' : 'c2');
}

/* ── SVG helpers ───────────────────────────────────────────── */

function mk(tag, attrs) {
    const e = document.createElementNS(NS, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
}

function initStaff() {
    const svg = document.getElementById('staff-svg');

    STAFF_Y.forEach(y => svg.appendChild(mk('line', {
        x1: 22, y1: y, x2: 468, y2: y,
        stroke: '#333', 'stroke-width': 1.5
    })));

    svg.appendChild(mk('line', { x1:22,  y1:55, x2:22,  y2:135, stroke:'#333', 'stroke-width':2 }));
    svg.appendChild(mk('line', { x1:468, y1:55, x2:468, y2:135, stroke:'#333', 'stroke-width':2 }));

    const clef = document.createElementNS(NS, 'text');
    clef.setAttribute('x', '24');
    clef.setAttribute('y', '152');
    clef.setAttribute('font-size', '107');
    clef.setAttribute('font-family', 'Georgia, "Times New Roman", serif');
    clef.setAttribute('fill', '#222');
    clef.textContent = '𝄞';
    svg.appendChild(clef);
}

function drawNote(note) {
    document.querySelectorAll('.ngrp').forEach(e => e.remove());

    const svg = document.getElementById('staff-svg');
    const g = document.createElementNS(NS, 'g');
    g.setAttribute('class', 'ngrp');

    const x = 280, y = note.y;

    // Ledger line below staff (C4 and enharmonics at y=155)
    if (y >= 155) {
        g.appendChild(mk('line', {
            x1: x-19, y1: 155, x2: x+19, y2: 155,
            stroke: '#333', 'stroke-width': 1.5
        }));
    }
    // Ledger line above staff (A5 and higher: y≤35)
    if (y <= 35) {
        g.appendChild(mk('line', {
            x1: x-19, y1: 35, x2: x+19, y2: 35,
            stroke: '#333', 'stroke-width': 1.5
        }));
    }

    // Accidental (♯ or ♭) drawn to the left of the note head
    if (note.acc) {
        const sym = note.acc === 'sharp' ? '♯' : '♭';
        // flat hangs lower visually, so adjust baseline accordingly
        const ay = note.acc === 'flat' ? y + 7 : y + 5;
        const acc = document.createElementNS(NS, 'text');
        acc.setAttribute('x', String(x - 19));
        acc.setAttribute('y', String(ay));
        acc.setAttribute('font-size', '17');
        acc.setAttribute('font-family', 'Georgia, serif');
        acc.setAttribute('fill', '#111');
        acc.setAttribute('text-anchor', 'middle');
        acc.textContent = sym;
        g.appendChild(acc);
    }

    // Note head (filled, slightly tilted ellipse)
    g.appendChild(mk('ellipse', {
        cx: x, cy: y, rx: 9, ry: 6.5,
        fill: '#111',
        transform: `rotate(-15,${x},${y})`
    }));

    // Stem: up (right side) for notes on/below B4 (y≥95), down (left) above
    const up = y >= 95;
    g.appendChild(mk('line', {
        x1: up ? x+8.5 : x-8.5,
        y1: up ? y-2   : y+2,
        x2: up ? x+8.5 : x-8.5,
        y2: up ? y-42  : y+42,
        stroke: '#111', 'stroke-width': 2
    }));

    svg.appendChild(g);
}

/* ── Piano builder ─────────────────────────────────────────── */

function buildPiano() {
    const piano = document.getElementById('piano');
    piano.style.width = (WHITE_NOTES.length * WHITE_W) + 'px';

    // White keys
    WHITE_NOTES.forEach((n, i) => {
        const k = document.createElement('div');
        k.className = 'key white';
        k.style.left = (i * WHITE_W) + 'px';
        k.dataset.keyid = n.keyId;
        k.innerHTML =
            `<span class="note-id">${n.id}</span>` +
            `<span class="solfege">${n.label}</span>`;
        k.addEventListener('click', () => answer(n.keyId, k));
        piano.appendChild(k);
    });

    // Black keys (positioned over the gap between adjacent white keys)
    BLACK_KEY_DEFS.forEach(bk => {
        const k = document.createElement('div');
        k.className = 'key black';
        // Center black key over the boundary between whiteLeft and whiteLeft+1
        k.style.left = (bk.whiteLeft * WHITE_W + WHITE_W - Math.floor(BLACK_W / 2)) + 'px';
        k.dataset.keyid = bk.keyId;
        k.innerHTML =
            `<span class="note-id">${bk.sharp}</span>` +
            `<span class="note-id">${bk.flat}</span>`;
        k.addEventListener('click', () => answer(bk.keyId, k));
        piano.appendChild(k);
    });
}

/* ── Quiz logic ────────────────────────────────────────────── */

function next() {
    ok = true;
    const fb = document.getElementById('fb');
    fb.textContent = '';
    fb.className = 'feedback';
    document.querySelectorAll('.key').forEach(k => k.classList.remove('correct', 'wrong'));
    cur = ALL_NOTES[Math.floor(Math.random() * ALL_NOTES.length)];
    drawNote(cur);
    startTimer();
}

function answer(keyId, keyEl) {
    if (!ok) return;
    ok = false;
    stopTimer();
    document.getElementById('tot').textContent = ++tot;

    const fb = document.getElementById('fb');
    if (keyId === cur.keyId) {
        document.getElementById('sc').textContent = ++sc;
        keyEl.classList.add('correct');
        combo++;
        fb.textContent = '✓ 정답입니다!';
        fb.className = 'feedback correct';
    } else {
        keyEl.classList.add('wrong');
        document.querySelector(`[data-keyid="${cur.keyId}"]`).classList.add('correct');
        combo = 0;
        fb.textContent = `✗ 오답! 정답은 ${cur.id}`;
        fb.className = 'feedback wrong';
    }
    renderCombo();

    setTimeout(next, 1500);
}

/* ── Settings dropdown ─────────────────────────────────────── */
const settingsBtn      = document.getElementById('settings-btn');
const settingsDropdown = document.getElementById('settings-dropdown');
const curLabel         = document.getElementById('cur-label');

settingsBtn.addEventListener('click', e => {
    e.stopPropagation();
    settingsDropdown.classList.toggle('open');
});

document.addEventListener('click', () => settingsDropdown.classList.remove('open'));

settingsDropdown.querySelectorAll('.dropdown-item').forEach(item => {
    item.addEventListener('click', e => {
        e.stopPropagation();
        const sec = parseInt(item.dataset.sec, 10);
        settingSec = sec;
        curLabel.textContent = sec === 0 ? 'OFF' : sec + '초';
        settingsDropdown.querySelectorAll('.dropdown-item')
            .forEach(i => i.classList.toggle('active', i === item));
        settingsDropdown.classList.remove('open');
    });
});

initStaff();
buildPiano();
next();
</script>
</body>
</html>
