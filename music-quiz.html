이건 실수로 추가한 내용입니다 ㅠㅠ

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>음표 맞추기 퀴즈</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #eef2f7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        h1 {
            font-size: 1.65rem;
            font-weight: 700;
            color: #2d3748;
        }

        .score {
            background: #fff;
            border-radius: 999px;
            padding: 7px 28px;
            font-size: 0.95rem;
            color: #718096;
            box-shadow: 0 1px 6px rgba(0,0,0,0.1);
        }
        .score b { color: #3182ce; font-size: 1.1rem; }

        .card {
            background: #fff;
            border-radius: 18px;
            padding: 22px 28px 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        #staff-svg { display: block; }

        @keyframes noteIn {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .ngrp { animation: noteIn 0.22s ease-out; }

        .feedback {
            font-size: 1.05rem;
            font-weight: 600;
            min-height: 34px;
            line-height: 34px;
            padding: 0 20px;
            border-radius: 8px;
            text-align: center;
            transition: background 0.2s, color 0.2s;
        }
        .feedback.correct { color: #22543d; background: #c6f6d5; }
        .feedback.wrong   { color: #742a2a; background: #fed7d7; }

        /* Piano */
        .piano {
            display: flex;
            filter: drop-shadow(0 6px 16px rgba(0,0,0,0.22));
        }

        .key {
            width: 38px;
            height: 145px;
            background: linear-gradient(to bottom, #f5f5f5, #ffffff);
            border: 1.5px solid #c8c8c8;
            border-bottom-width: 4px;
            border-radius: 0 0 8px 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 10px;
            gap: 2px;
            transition: background 0.07s, transform 0.07s, border-color 0.15s;
            user-select: none;
            -webkit-user-select: none;
        }
        .key:not(:first-child) { margin-left: -1.5px; }
        .key:hover { background: linear-gradient(to bottom, #dbeafe, #eff6ff); }
        .key:active {
            transform: translateY(2px);
            background: linear-gradient(to bottom, #bfdbfe, #dbeafe);
        }
        .key.correct {
            background: linear-gradient(to bottom, #9ae6b4, #c6f6d5) !important;
            border-color: #38a169;
        }
        .key.wrong {
            background: linear-gradient(to bottom, #fc8181, #fed7d7) !important;
            border-color: #e53e3e;
        }
        .key .solfege {
            font-size: 0.85rem;
            font-weight: 700;
            color: #4a5568;
        }
        .key .note-id {
            font-size: 0.65rem;
            color: #a0aec0;
            font-weight: 500;
        }
        .key.correct .solfege, .key.correct .note-id { color: #22543d; }
        .key.wrong   .solfege, .key.wrong   .note-id { color: #742a2a; }
    </style>
</head>
<body>

<h1>🎵 음표 맞추기</h1>

<div class="score">
    점수: <b id="sc">0</b> / <b id="tot">0</b>
</div>

<div class="card">
    <!--
        Staff line positions (y):
          Line 5  F5  = 55
          Line 4  D5  = 75
          Line 3  B4  = 95   ← middle line
          Line 2  G4  = 115
          Line 1  E4  = 135
        Note y positions (10px per step):
          B5=25, A5=35*, G5=45, F5=55, E5=65, D5=75, C5=85
          B4=95, A4=105, G4=115, F4=125, E4=135, D4=145, C4=155*
          * = ledger line drawn at that y
    -->
    <svg id="staff-svg" viewBox="0 0 490 220" width="490" height="220"
         xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<div class="feedback" id="fb"></div>

<div class="piano" id="piano"></div>

<script>
const NOTES = [
    { id:'C4', label:'도', y:155 },
    { id:'D4', label:'레', y:145 },
    { id:'E4', label:'미', y:135 },
    { id:'F4', label:'파', y:125 },
    { id:'G4', label:'솔', y:115 },
    { id:'A4', label:'라', y:105 },
    { id:'B4', label:'시', y: 95 },
    { id:'C5', label:'도', y: 85 },
    { id:'D5', label:'레', y: 75 },
    { id:'E5', label:'미', y: 65 },
    { id:'F5', label:'파', y: 55 },
    { id:'G5', label:'솔', y: 45 },
    { id:'A5', label:'라', y: 35 },
    { id:'B5', label:'시', y: 25 },
];

const STAFF_Y = [55, 75, 95, 115, 135]; // top → bottom (F5, D5, B4, G4, E4)
const NS = 'http://www.w3.org/2000/svg';

let cur = null, sc = 0, tot = 0, ok = true;

/* Helper: create SVG element with attributes */
function mk(tag, attrs) {
    const e = document.createElementNS(NS, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
}

/* Draw static staff (lines + clef) once */
function initStaff() {
    const svg = document.getElementById('staff-svg');

    // 5 staff lines
    STAFF_Y.forEach(y => svg.appendChild(mk('line', {
        x1: 22, y1: y, x2: 468, y2: y,
        stroke: '#333', 'stroke-width': 1.5
    })));

    // Left / right bar lines
    svg.appendChild(mk('line', { x1:22,  y1:55, x2:22,  y2:135, stroke:'#333', 'stroke-width':2 }));
    svg.appendChild(mk('line', { x1:468, y1:55, x2:468, y2:135, stroke:'#333', 'stroke-width':2 }));

    // Treble clef (𝄞 U+1D11E)
    // Baseline y≈152 positions the G-curl near the G4 line (y=115)
    const clef = document.createElementNS(NS, 'text');
    clef.setAttribute('x', '24');
    clef.setAttribute('y', '152');
    clef.setAttribute('font-size', '107');
    clef.setAttribute('font-family', 'Georgia, "Times New Roman", serif');
    clef.setAttribute('fill', '#222');
    clef.textContent = '𝄞';
    svg.appendChild(clef);
}

/* Draw a single note (replaces previous) */
function drawNote(note) {
    document.querySelectorAll('.ngrp').forEach(e => e.remove());

    const svg = document.getElementById('staff-svg');
    const g   = document.createElementNS(NS, 'g');
    g.setAttribute('class', 'ngrp');

    const x = 280, y = note.y;

    // Ledger line below staff: C4 (y=155)
    if (y >= 155) {
        g.appendChild(mk('line', {
            x1: x-17, y1: 155, x2: x+17, y2: 155,
            stroke: '#333', 'stroke-width': 1.5
        }));
    }
    // Ledger line above staff: A5 (y=35) — shown for both A5 and B5
    if (y <= 35) {
        g.appendChild(mk('line', {
            x1: x-17, y1: 35, x2: x+17, y2: 35,
            stroke: '#333', 'stroke-width': 1.5
        }));
    }

    // Filled, slightly-tilted note head
    g.appendChild(mk('ellipse', {
        cx: x, cy: y, rx: 9, ry: 6.5,
        fill: '#111',
        transform: `rotate(-15,${x},${y})`
    }));

    // Stem: up (right side) for notes at or below B4 (y≥95), down (left) above B4
    const up = y >= 95;
    g.appendChild(mk('line', {
        x1: up ? x+8.5 : x-8.5,
        y1: up ? y-2   : y+2,
        x2: up ? x+8.5 : x-8.5,
        y2: up ? y-42  : y+42,
        stroke: '#111', 'stroke-width': 2
    }));

    svg.appendChild(g);
}

/* Build the 8 piano keys */
function buildPiano() {
    const piano = document.getElementById('piano');
    NOTES.forEach((n, i) => {
        const k = document.createElement('div');
        k.className = 'key';
        k.innerHTML =
            `<span class="solfege">${n.label}</span>` +
            `<span class="note-id">${n.id}</span>`;
        k.addEventListener('click', () => answer(i, k));
        piano.appendChild(k);
    });
}

/* Show next random question */
function next() {
    ok = true;
    const fb = document.getElementById('fb');
    fb.textContent = '';
    fb.className = 'feedback';
    document.querySelectorAll('.key').forEach(k => k.classList.remove('correct', 'wrong'));
    cur = NOTES[Math.floor(Math.random() * NOTES.length)];
    drawNote(cur);
}

/* Handle key click */
function answer(i, keyEl) {
    if (!ok) return;
    ok = false;
    document.getElementById('tot').textContent = ++tot;

    const fb = document.getElementById('fb');
    if (NOTES[i] === cur) {
        document.getElementById('sc').textContent = ++sc;
        keyEl.classList.add('correct');
        fb.textContent = '✓ 정답입니다!';
        fb.className = 'feedback correct';
    } else {
        keyEl.classList.add('wrong');
        document.querySelectorAll('.key')[NOTES.indexOf(cur)].classList.add('correct');
        fb.textContent = `✗ 오답! 정답은 "${cur.label}" (${cur.id})`;
        fb.className = 'feedback wrong';
    }

    setTimeout(next, 1500);
}

initStaff();
buildPiano();
next();
</script>
</body>
</html>
