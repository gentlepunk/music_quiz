<!DOCTYPE html>
<!-- HTML 파일임을 선언. 브라우저에게 "이건 HTML5 문서야"라고 알려주는 것 -->
<html lang="ko">
<head>
    <!-- head 섹션: 실제 화면에 보이지 않는 메타정보와 스타일 정의 영역 -->
    <meta charset="UTF-8">
    <!-- UTF-8 인코딩 선언. Python의 # -*- coding: utf-8 -*- 와 같은 역할 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 모바일 화면 크기에 맞게 조정하는 설정 -->
    <title>음표 맞추기 퀴즈</title>
    <!-- 브라우저 탭에 표시되는 제목 -->

    <style>
        /*
         * CSS(스타일시트): HTML 요소들의 시각적 표현을 정의하는 언어
         * Python에서 클래스 속성처럼, 각 HTML 요소가 어떻게 보일지 정한다
         * 형식: 선택자(대상) { 속성: 값; }
         */

        /* ── CSS 변수: 뷰포트 기준 반응형 너비 ─────────────────── */
        :root {
            --card-w: min(490px, 96vw); /* 카드 최대 너비: PC는 490px, 모바일은 화면 96% */
        }

        /* 모든 요소(*): 기본 여백/패딩 제거, 박스 크기 계산 방식 통일 */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* body: 페이지 전체 배경 및 레이아웃 설정 */
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; /* 기본 글꼴 */
            background: #eef2f7;    /* 연한 파란빛 회색 배경 */
            min-height: 100vh;      /* 최소 높이를 화면 전체로 */
            display: flex;          /* flexbox: 자식 요소를 유연하게 배치하는 레이아웃 */
            flex-direction: column; /* 자식 요소를 세로로 쌓음 */
            align-items: center;    /* 가로 방향 가운데 정렬 */
            justify-content: center;/* 세로 방향 가운데 정렬 */
            gap: 20px;              /* 자식 요소 사이 간격 20px */
            /* clamp(최솟값, 기준값, 최댓값): 모바일에서 여백 줄어듦 */
            padding: clamp(10px, 3vw, 20px);
        }

        /* h1: 제목 텍스트 스타일 */
        h1 {
            /* clamp: 화면 너비에 따라 1.2rem~1.65rem 사이에서 자동 조정 */
            font-size: clamp(1.2rem, 4vw, 1.65rem);
            font-weight: 700;       /* 굵기 (700 = 굵게) */
            color: #2d3748;         /* 진한 회색 */
        }

        /* ── 화면(Screen) 관리 ────────────────────────────────── */
        /*
         * 이 앱은 화면이 3개: 시작화면 / 퀴즈화면 / 결과화면
         * Python의 if/elif 분기처럼, 한 번에 하나만 보임
         * display:none = 숨기기, display:flex = 보이기
         */
        .screen { display: none; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .screen.active { display: flex; } /* 'active' 클래스가 붙으면 표시 */

        /* ── 점수 표시 배지 ───────────────────────────────────── */
        .score {
            background: #fff;
            border-radius: 999px;       /* 완전한 타원형 모양 */
            padding: 7px 28px;          /* 위아래 7px, 좌우 28px 여백 */
            font-size: 0.95rem;
            color: #718096;
            box-shadow: 0 1px 6px rgba(0,0,0,0.1); /* 그림자 효과 */
            min-width: 110px;
            text-align: center;
        }
        .score b { color: #3182ce; font-size: 1.1rem; } /* b 태그(굵은 글자): 파란색으로 */

        /* ── 콤보 표시 배지 ───────────────────────────────────── */
        .combo {
            background: #fff;
            border-radius: 999px;
            padding: 7px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            box-shadow: 0 1px 6px rgba(0,0,0,0.1);
            display: block;         /* 항상 표시 */
            min-width: 80px;
            text-align: center;
        }
        .combo.c2  { color: #2b6cb0; }      /* 2콤보 이상: 파란색 */
        .combo.c5  { color: #c05621; }      /* 5콤보 이상: 주황색 */
        .combo.c10 { color: #c53030; font-weight: 800; } /* 10콤보 이상: 빨간색 + 더 굵게 */

        /* ── 카드(흰 박스) 공통 스타일 ───────────────────────── */
        .card {
            background: #fff;
            border-radius: 18px;    /* 모서리를 둥글게 */
            padding: 22px 28px 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: var(--card-w);   /* 반응형: 뷰포트에 맞게 축소 */
        }

        /* SVG(악보 그래픽): 블록 요소로 표시. width:100%로 카드 너비에 맞게 자동 축소 */
        #staff-svg { display: block; width: 100%; height: auto; }

        /*
         * CSS 애니메이션: 음표가 위에서 내려오며 나타나는 효과
         * Python에서 time.sleep()으로 구현할 것을 CSS가 자동으로 처리
         * @keyframes: 애니메이션의 시작(from)과 끝(to) 상태를 정의
         */
        @keyframes noteIn {
            from { opacity: 0; transform: translateY(-10px); } /* 투명하고 10px 위에서 시작 */
            to   { opacity: 1; transform: translateY(0); }     /* 불투명하고 제자리로 이동 */
        }
        .ngrp { animation: noteIn 0.22s ease-out; } /* ngrp 클래스에 0.22초 애니메이션 적용 */

        /* ── 타이머 바 ────────────────────────────────────────── */
        .timer-wrap {
            width: var(--card-w);   /* 반응형: 카드 너비와 동일하게 */
            height: 10px;
            background: #e2e8f0;    /* 회색 배경 (빈 부분) */
            border-radius: 99px;
            overflow: hidden;       /* 자식 요소가 넘치면 잘라냄 */
        }
        .timer-bar {
            height: 100%;
            border-radius: 99px;
            /* transition: CSS 속성이 변할 때 부드럽게 전환 (Python의 선형보간과 유사) */
            transition: width 0.1s linear, background-color 0.4s ease;
            background: #48bb78;    /* 초록색 (시간 여유 있음) */
        }
        .timer-bar.danger { background: #f56565; } /* 'danger' 클래스 추가 시 빨간색으로 변경 */

        /* ── 정답/오답 피드백 텍스트 ─────────────────────────── */
        .feedback {
            font-size: 1.05rem;
            font-weight: 600;
            min-height: 34px;       /* 텍스트 없어도 자리 차지 (레이아웃 흔들림 방지) */
            line-height: 34px;
            padding: 0 20px;
            border-radius: 8px;
            text-align: center;
            transition: background 0.2s, color 0.2s; /* 색상 변화를 부드럽게 */
        }
        .feedback.correct { color: #22543d; background: #c6f6d5; } /* 정답: 초록 배경 */
        .feedback.wrong   { color: #742a2a; background: #fed7d7; } /* 오답: 빨간 배경 */

        /* ── 피아노 건반 컨테이너 ────────────────────────────── */
        .piano {
            position: relative;     /* 자식 요소를 절대 좌표로 배치하기 위한 기준점 */
            height: 145px;
            filter: drop-shadow(0 6px 16px rgba(0,0,0,0.22)); /* 전체 피아노에 그림자 */
            width: var(--card-w);   /* 반응형: 카드 너비 기준 */
            overflow: visible;      /* 건반이 컨테이너 밖으로 나가도 클리핑 안 함 */
            transform-origin: top left; /* scaleX 기준점: 왼쪽 상단 */
        }

        /* 건반 공통 스타일 */
        .key {
            position: absolute;     /* 피아노 컨테이너 기준으로 절대 위치 지정 */
            top: 0;
            border-radius: 0 0 8px 8px; /* 아래쪽 모서리만 둥글게 (건반 모양) */
            cursor: pointer;        /* 마우스 포인터를 손가락 모양으로 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end; /* 텍스트를 건반 아래쪽에 배치 */
            transition: background 0.07s, transform 0.07s, border-color 0.15s;
            user-select: none;      /* 텍스트 드래그 선택 방지 */
            -webkit-user-select: none; /* Safari 호환성 */
        }

        /* 흰 건반 스타일 */
        .key.white {
            width: 38px;
            height: 145px;
            background: linear-gradient(to bottom, #f5f5f5, #ffffff); /* 위→아래 그라디언트 */
            border: 1px solid #c8c8c8;
            border-bottom-width: 4px;
            z-index: 1;             /* z-index: 겹칠 때 쌓이는 순서 (파이썬 리스트 인덱스와 개념 유사) */
            padding-bottom: 8px;
            gap: 2px;
        }
        .key.white:hover { background: linear-gradient(to bottom, #dbeafe, #eff6ff); } /* 마우스 올리면 연파랑 */
        .key.white:active {             /* 마우스 클릭 중 상태 */
            transform: translateY(2px); /* 2px 아래로 내려가는 효과 (건반 누르는 느낌) */
            background: linear-gradient(to bottom, #bfdbfe, #dbeafe);
        }
        .key.white .note-id { font-size: 0.82rem; color: #2d3748; font-weight: 400; }

        /* 검은 건반 스타일 */
        .key.black {
            width: 22px;
            height: 88px;           /* 흰 건반보다 짧음 */
            background: linear-gradient(to bottom, #1a1a1a, #3a3a3a);
            border: 1px solid #111;
            border-bottom-width: 3px;
            z-index: 2;             /* 흰 건반(z-index:1)보다 위에 렌더링 */
            padding-bottom: 5px;
            gap: 1px;
        }
        .key.black:hover  { background: linear-gradient(to bottom, #2a3a5a, #3a4a6a); }
        .key.black:active {
            transform: translateY(2px);
            background: linear-gradient(to bottom, #3a4a7a, #4a5a8a);
        }
        .key.black .note-id {
            font-size: 0.44rem;     /* 검은 건반은 좁아서 글씨를 매우 작게 */
            color: #ccc;
            font-weight: 500;
            line-height: 1.4;
            text-align: center;
        }

        /* 정답 건반: 초록색으로 표시 (!important: 다른 스타일보다 우선 적용) */
        .key.correct {
            background: linear-gradient(to bottom, #9ae6b4, #c6f6d5) !important;
            border-color: #38a169 !important;
        }
        /* 오답 건반: 빨간색으로 표시 */
        .key.wrong {
            background: linear-gradient(to bottom, #fc8181, #fed7d7) !important;
            border-color: #e53e3e !important;
        }
        /* 정답/오답 건반의 텍스트 색상도 함께 변경 */
        .key.white.correct .note-id { color: #22543d; }
        .key.white.wrong   .note-id { color: #742a2a; }
        .key.black.correct .note-id { color: #22543d; }
        .key.black.wrong   .note-id { color: #742a2a; }

        /* ── 시작 화면 카드 ───────────────────────────────────── */
        .start-card {
            background: #fff;
            border-radius: 20px;
            padding: 32px 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 24px;
            width: var(--card-w);   /* 반응형: 고정 420px → 뷰포트 기준 */
        }

        .option-group { display: flex; flex-direction: column; gap: 10px; }

        /* 옵션 그룹 라벨 (UPPERCASE 소제목) */
        .option-group-label {
            font-size: 0.82rem;
            font-weight: 700;
            color: #a0aec0;
            text-transform: uppercase;  /* 텍스트를 대문자로 변환 */
            letter-spacing: 0.06em;     /* 글자 간격 */
        }

        .option-btns { display: flex; gap: 8px; }

        /* 옵션 버튼 (문제 수, 시간 선택) */
        .opt-btn {
            flex: 1;                /* 남은 공간을 균등하게 나눠 가짐 */
            padding: 10px 0;
            border-radius: 10px;
            border: 2px solid #e2e8f0;
            background: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            color: #4a5568;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s, color 0.15s;
        }
        .opt-btn:hover { background: #ebf4ff; border-color: #90cdf4; }
        .opt-btn.active { background: #ebf4ff; border-color: #3182ce; color: #2b6cb0; } /* 선택된 버튼 */

        /* 시작하기 버튼 */
        .start-btn {
            padding: 14px 0;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #3182ce, #2b6cb0); /* 대각선 그라디언트 */
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(49,130,206,0.35);
            transition: opacity 0.15s, transform 0.1s;
        }
        .start-btn:hover  { opacity: 0.92; transform: translateY(-1px); } /* 살짝 올라오는 효과 */
        .start-btn:active { transform: translateY(0); }

        /* ── 퀴즈 화면 상단 행 ────────────────────────────────── */
        .quiz-top-row {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;  /* 가운데 정렬 */
            width: var(--card-w);
        }


        /* 진행 상황 표시 (현재문제/총문제) */
        .progress {
            background: #fff;
            border-radius: 999px;
            padding: 7px 22px;
            font-size: 0.95rem;
            font-weight: 700;
            color: #718096;
            box-shadow: 0 1px 6px rgba(0,0,0,0.1);
            min-width: 80px;
            text-align: center;
        }
        .progress .cur { color: #3182ce; font-size: 1.05rem; } /* 현재 문제 번호: 파란색 */

        /* ── 결과 화면 카드 ───────────────────────────────────── */
        .result-card {
            background: #fff;
            border-radius: 20px;
            padding: 32px 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: var(--card-w);   /* 반응형: 고정 420px → 뷰포트 기준 */
        }

        /* 큰 점수 숫자 */
        .result-score-big {
            text-align: center;
            padding: 8px 0;
        }
        .result-score-big .big-num {
            font-size: 2.6rem;
            font-weight: 800;
            color: #2d3748;
            line-height: 1;
        }
        .result-score-big .big-num span { color: #3182ce; } /* 점수 숫자: 파란색 */
        .result-score-big .sub {
            font-size: 0.95rem;
            font-weight: 600;
            color: #a0aec0;
            margin-top: 6px;
        }

        /* 결과 통계 행 (정답률, 최고 콤보, 총 시간) */
        .result-meta {
            display: flex;
            justify-content: space-around; /* 균등 간격으로 배치 */
            background: #f7fafc;
            border-radius: 12px;
            padding: 14px 0;
        }
        .result-meta-item { display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .result-meta-item .label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .result-meta-item .value { font-size: 1.2rem; font-weight: 700; color: #4a5568; }

        /* 틀린 음 통계 섹션 제목 */
        .wrong-section-title {
            font-size: 0.82rem;
            font-weight: 700;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            border-top: 1px solid #e2e8f0; /* 위쪽 구분선 */
            padding-top: 16px;
        }

        /* 틀린 음 목록 컨테이너 */
        .wrong-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 190px;
            overflow-y: auto;   /* 내용이 넘치면 세로 스크롤 표시 */
        }

        /* 틀린 음 개별 항목 */
        .wrong-item {
            display: flex;
            justify-content: space-between; /* 양쪽 끝으로 배치 */
            align-items: center;
            padding: 8px 14px;
            border-radius: 8px;
            background: #fff5f5;            /* 연한 빨강 배경 */
        }
        .wrong-item .note-name { font-weight: 700; color: #c53030; font-size: 1rem; }
        .wrong-item .wrong-count {
            font-size: 0.85rem;
            color: #718096;
            background: #fed7d7;
            border-radius: 999px;
            padding: 2px 10px;
            font-weight: 600;
        }

        /* 오답 없음 메시지 */
        .no-wrong {
            text-align: center;
            color: #38a169;
            font-weight: 700;
            font-size: 1rem;
            padding: 12px 0;
        }

        /* ── 조성 안내 힌트 배지 ─────────────────────────────── */
        .key-hint {
            background: #ebf8ff;
            border: 1px solid #bee3f8;
            border-radius: 8px;
            padding: 6px 18px;
            font-size: 0.88rem;
            font-weight: 600;
            color: #2c5282;
            display: none;          /* 다장조(초급)일 때는 숨김 */
        }
        .key-hint.show { display: block; }

        /* 처음으로 돌아가기 버튼 (시작하기 버튼과 동일한 스타일) */
        .restart-btn {
            padding: 14px 0;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #3182ce, #2b6cb0);
            color: #fff;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(49,130,206,0.35);
            transition: opacity 0.15s, transform 0.1s;
        }
        .restart-btn:hover  { opacity: 0.92; transform: translateY(-1px); }
        .restart-btn:active { transform: translateY(0); }

        /* 약점 집중 모드 버튼 (restart-btn과 동일 구조, 빨간 계열) */
        .retry-wrong-btn {
            padding: 14px 0;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #e53e3e, #c53030);
            color: #fff;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(197,48,48,0.35);
            transition: opacity 0.15s, transform 0.1s;
        }
        .retry-wrong-btn:hover  { opacity: 0.92; transform: translateY(-1px); }
        .retry-wrong-btn:active { transform: translateY(0); }

        /* 최고기록 배지 */
        .best-record-badge {
            text-align: center;
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 700;
        }
        /* 신기록 / 첫 기록: 금색 강조 */
        .best-record-badge.new-record {
            background: #fffbeb;

<script>
/*
 * JavaScript 섹션: 실제 앱 로직

/* ── 음표 데이터 ─────────────────────────────────────────────── */

 * WHITE_NOTES: 흰 건반 음표 데이터 (Python의 딕셔너리 리스트와 동일한 구조)

 *   keyId: 피아노 건반과 연결하는 키 (같은 keyId끼리 같은 건반)
 */
const WHITE_NOTES = [
    { id:'C4', label:'다', y:155, acc:null, keyId:'C4' },
    { id:'D4', label:'라', y:145, acc:null, keyId:'D4' },

    { id:'C5', label:'다', y: 85, acc:null, keyId:'C5' },
    { id:'D5', label:'라', y: 75, acc:null, keyId:'D5' },
    { id:'E5', label:'마', y: 65, acc:null, keyId:'E5' },

    { id:'A5', label:'가', y: 35, acc:null, keyId:'A5' },
    { id:'B5', label:'나', y: 25, acc:null, keyId:'B5' },

/*
 * BLACK_NOTES: 검은 건반 음표 데이터
 * acc: 'sharp'(♯, 반음 올림) 또는 'flat'(♭, 반음 내림)
 * keyId: 같은 건반의 샵과 플랫은 동일한 keyId를 공유
 *   예) C#4와 D♭4는 같은 검은 건반이므로 keyId='Cs4'로 동일
 * y값이 흰 건반과 겹치는 이유: 악보에서 같은 줄/칸에 그려지기 때문
 */
const BLACK_NOTES = [
    { id:'C#4', y:155, acc:'sharp', keyId:'Cs4' },
    { id:'D♭4', y:145, acc:'flat',  keyId:'Cs4' },
    { id:'D#4', y:145, acc:'sharp', keyId:'Ds4' },
    { id:'E♭4', y:135, acc:'flat',  keyId:'Ds4' },
    { id:'F#4', y:125, acc:'sharp', keyId:'Fs4' },
    { id:'G♭4', y:115, acc:'flat',  keyId:'Fs4' },
    { id:'G#4', y:115, acc:'sharp', keyId:'Gs4' },
    { id:'A♭4', y:105, acc:'flat',  keyId:'Gs4' },
    { id:'A#4', y:105, acc:'sharp', keyId:'As4' },
    { id:'B♭4', y: 95, acc:'flat',  keyId:'As4' },

];

/* 흰 건반 + 검은 건반 전체 목록. Python의 리스트 덧셈: WHITE_NOTES + BLACK_NOTES */
const ALL_NOTES = [...WHITE_NOTES, ...BLACK_NOTES];

/* ── 낮은음자리표(베이스) 음표 데이터 ────────────────────────── */
/*
 * BASS_WHITE_NOTES: C2~B3 음역대 흰 건반 음표
 * 오선 y좌표는 높은음자리표와 동일한 SVG 좌표계를 재활용
 * (오선: y=55/75/95/115/135)
 */
const BASS_WHITE_NOTES = [
    { id:'E2', label:'마', y:155, acc:null, keyId:'E2' },
    { id:'F2', label:'바', y:145, acc:null, keyId:'F2' },
    { id:'G2', label:'사', y:135, acc:null, keyId:'G2' },

/*
 * BASS_BLACK_NOTES: 낮은음자리표 검은 건반 음표 (샵/플랫 쌍)

];

/* 낮은음자리표 전체 음표 목록 */
const BASS_ALL_NOTES = [...BASS_WHITE_NOTES, ...BASS_BLACK_NOTES];

/* ── 조성(Key Signature) 데이터 ─────────────────────────────── */
/*
 * 난이도별 사용할 조성 목록. 각 조성 객체:
 *   id: 조성 식별자
 *   name: 한국어 조성명
 *   sharps: 이 조성에서 반음 올려 연주하는 음의 음이름 알파벳 배열 (예: F → F# 으로 연주)
 *   flats: 이 조성에서 반음 내려 연주하는 음의 음이름 알파벳 배열 (예: B → Bb 으로 연주)

    beginner: [
        /* 다장조 (C major): 샵/플랫 없음. 흰 건반만 사용 */

        { id:'E',  code:'E major',  name:'마장조',    sharps:['F','C','G','D'], flats:[],              hint:'F#, C#, G#, D# 주의' },

        { id:'Eb', code:'Eb major', name:'내림마장조', sharps:[],                flats:['B','E','A'],   hint:'Bb, Eb, Ab 주의' },

        { id:'Ab', code:'Ab major', name:'내림가장조', sharps:[],                flats:['B','E','A','D'], hint:'Bb, Eb, Ab, Db 주의' }

};

/*
 * SVG에 조표 기호(♯/♭)를 그릴 때 사용하는 y좌표 (오선 위치 기준)

 *   플랫 순서: B→95(3번선), E→65(4칸), A→105(2칸), D→77(4번선)
 */

/*
 * BLACK_KEY_DEFS: 검은 건반의 위치 정보
 * whiteLeft: 이 검은 건반 바로 왼쪽에 있는 흰 건반의 인덱스 (0부터 시작)
 * 피아노 레이아웃 계산에 사용
 */

const WHITE_W = 38;     /* 흰 건반 너비 (픽셀) */
const BLACK_W = 22;     /* 검은 건반 너비 (픽셀) */
const STAFF_Y = [55, 75, 95, 115, 135]; /* 오선의 y좌표 5개 */
const NS = 'http://www.w3.org/2000/svg'; /* SVG 네임스페이스 (SVG 요소 생성 시 필요) */

/* ── 앱 상태 변수 ────────────────────────────────────────────── */
/*
 * Python의 전역 변수와 동일한 개념
 * let: 재할당 가능한 변수 (Python의 일반 변수)
 */
let cur = null;     /* 현재 문제 음표 객체 */
let sc = 0;         /* 정답 수 (score) */
let tot = 0;        /* 총 시도 수 */
let ok = true;      /* 현재 입력 받을 수 있는지 여부 (중복 클릭 방지) */
let combo = 0;      /* 현재 연속 정답 수 */
let maxCombo = 0;   /* 최고 연속 정답 수 */
let totalQ = 10;    /* 총 문제 수 (기본값 10) */
let settingSec = 7; /* 설정된 제한 시간 (기본값 7초) */
let quizStartTime = 0; /* 퀴즈 시작 시각 (밀리초 타임스탬프) */
let wrongMap = {};  /* 틀린 음 통계. Python 딕셔너리처럼 {음이름: 틀린횟수} */
let settingDifficulty = 'beginner'; /* 선택된 난이도: 'beginner' | 'intermediate' | 'advanced' */
let settingNoteSound  = false;      /* 음표 소리 ON/OFF */
let settingEffect     = false;      /* 정답/오답 효과음 ON/OFF */
let currentKeySig = null;           /* 현재 퀴즈에서 사용 중인 조성 객체 */
let notePool = [];                  /* 현재 조성에서 출제 가능한 음표 목록 */
let retryWrongMode = false;         /* 틀린 문제 집중 재출제 모드 여부 */
let wrongNoteIds = [];              /* 퀴즈 중 틀린 음표 id 목록 (중복 없음, 재출제 가중치에 사용) */
let settingClef = 'treble';         /* 선택된 음자리표: 'treble' | 'bass' | 'random' */
let activeClef  = 'treble';         /* 현재 문제에서 실제 사용 중인 음자리표 */

/* ── 타이머 ──────────────────────────────────────────────────── */
const TICK_MS = 50;         /* 타이머 갱신 간격 (50ms = 초당 20번 업데이트) */
let timerSec = 5;           /* 현재 타이머의 전체 시간 */
let timerInterval = null;   /* setInterval 반환값 저장 (Python의 스레드 핸들과 유사) */
let timeLeft = 5;           /* 남은 시간 */

/*
 * startTimer(): 타이머 시작
 * setInterval: Python의 threading.Timer와 유사하지만 반복 실행
 *   setInterval(함수, 간격ms) → 지정 간격마다 함수를 반복 호출
 */
function startTimer() {
    clearInterval(timerInterval); /* 이전 타이머가 있으면 먼저 중지 */
    timerSec = settingSec;

    const wrap = document.querySelector('.timer-wrap'); /* CSS 선택자로 요소 찾기 */
    if (timerSec === 0) { wrap.style.visibility = 'hidden'; return; } /* OFF면 숨기고 종료 */

    wrap.style.visibility = 'visible';
    timeLeft = timerSec;
    renderTimer();
    /* 50ms마다 아래 함수 실행. 화살표 함수 () => {} 는 Python의 lambda와 유사 */
    timerInterval = setInterval(() => {
        timeLeft = Math.max(0, timeLeft - TICK_MS / 1000); /* 0 미만으로 내려가지 않게 */
        renderTimer();
        if (timeLeft === 0) timeout(); /* 시간 다 되면 timeout 처리 */
    }, TICK_MS);
}

/* stopTimer(): setInterval을 중지 */
function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
}

/* renderTimer(): 타이머 바의 너비와 색상을 업데이트 */
function renderTimer() {
    const bar = document.getElementById('timer-bar');
    /* 남은 시간 비율(%)로 바의 너비 설정. 예: 3초/5초 = 60% */
    bar.style.width = (timeLeft / timerSec * 100) + '%';
    /* 2초 이하면 'danger' 클래스 추가 → 빨간색으로 변함 */
    bar.classList.toggle('danger', timeLeft <= 2);
}

/* timeout(): 시간 초과 처리 */
function timeout() {
    if (!ok) return; /* 이미 답변 처리된 경우 무시 */
    ok = false;
    stopTimer();
    document.getElementById('tot').textContent = ++tot; /* tot 증가 후 화면에 표시 */
    /* data-keyid 속성이 cur.keyId인 요소에 'correct' 클래스 추가 → 정답 건반 초록색으로 표시 */
    document.querySelector(`[data-keyid="${cur.keyId}"]`).classList.add('correct');
    const fb = document.getElementById('fb');
    fb.textContent = `⏰ 시간 초과! 정답은 ${cur.id}`; /* 템플릿 리터럴: Python f-string과 동일 */
    fb.className = 'feedback wrong';
    playEffect('wrong');
    wrongMap[cur.id] = (wrongMap[cur.id] || 0) + 1; /* 없으면 0으로 초기화 후 +1 */
    /* 틀린 음표 id 누적 (이미 있으면 추가 안 함 — includes: Python의 in 연산자와 동일) */
    if (!wrongNoteIds.includes(cur.id)) wrongNoteIds.push(cur.id);
    combo = 0;
    renderCombo();
    afterAnswer();
}

/*
 * renderCombo(): 콤보 표시 업데이트
 * 항상 "🔥 {combo}" 형태로 표시. 2 미만이면 기본색(회색), 이상이면 c2/c5/c10 색상 클래스 적용
 */
function renderCombo() {
    const el = document.getElementById('combo');
    el.textContent = `🔥 ${combo}`;
    if (combo >= 10) {
        el.className = 'combo c10';
    } else if (combo >= 5) {
        el.className = 'combo c5';
    } else if (combo >= 2) {
        el.className = 'combo c2';
    } else {
        el.className = 'combo'; /* 회색(기본색) */
    }
}

/* ── 조성 관련 함수 ───────────────────────────────────────────── */

/*
 * buildNotePool(keySig, clef): 선택된 조성과 음자리표에 맞는 출제 가능 음표 목록을 반환
 * - clef === 'treble': C4~B5 (ALL_NOTES 사용)
 * - clef === 'bass'  : E2~B3 (BASS_ALL_NOTES 사용)
 * 예) 사장조(F#)면 F4 대신 F#4, F5 대신 F#5가 포함됨
 * Python으로 표현하면:
 *   pool = []
 *   for oct in octaves:
 *       for letter in ['C','D','E','F','G','A','B']:
 *           if letter in keySig.sharps: pool.append(find_note(f"{letter}#{oct}"))
 *           elif letter in keySig.flats: pool.append(find_note(f"{letter}♭{oct}"))
 *           else: pool.append(find_note(f"{letter}{oct}"))
 */
function buildNotePool(keySig, clef) {
    const letters = ['C','D','E','F','G','A','B'];
    /* 음자리표에 따라 사용할 음표 데이터셋과 옥타브 목록 결정 */
    const noteSet = (clef === 'bass') ? BASS_ALL_NOTES : ALL_NOTES;
    const octaves = (clef === 'bass') ? [2, 3] : [4, 5];
    const pool = [];
    for (const oct of octaves) {
        for (const letter of letters) {
            let note;
            if (keySig.sharps.includes(letter)) {
                /* noteSet에서 해당 샵 음표 찾기. 예: 'F#4' */
                note = noteSet.find(n => n.id === `${letter}#${oct}`);
            } else if (keySig.flats.includes(letter)) {
                /* noteSet에서 해당 플랫 음표 찾기. 예: 'B♭4' (♭ 유니코드 문자 사용) */
                note = noteSet.find(n => n.id === `${letter}♭${oct}`);
            } else {
                /* 자연음 찾기. 예: 'C4' */
                note = noteSet.find(n => n.id === `${letter}${oct}`);
            }
            if (note) pool.push(note);
        }
    }
    return pool;
}

/*
 * renderKeySignature(keySig): 악보에 조표를 그리고 힌트 텍스트를 업데이트
 *
 * ★ 이미지로 교체할 때: 이 함수 내부의 SVG 텍스트 코드를 지우고
 *   <image> 태그로 조표 이미지를 배치하면 됨. 함수 시그니처(인자/호출부)는 그대로 유지.
 *
 * keySig.sharps/flats가 비어있으면(다장조) 조표 없이 힌트만 숨김 처리.
 */
function renderKeySignature(keySig) {
    const svg = document.getElementById('staff-svg');

    /* 기존 조표 그룹 제거 */
    const old = document.getElementById('key-sig-grp');
    if (old) old.remove();

    /* 힌트 텍스트 업데이트 */
    const hint = document.getElementById('key-hint');
    if (!keySig.hint) {
        hint.className = 'key-hint'; /* 다장조: 힌트 숨김 */
        return;
    }
    hint.textContent = `현재 조성: ${keySig.code} (${keySig.hint})`;
    hint.className = 'key-hint show';

    /* ── 조표 SVG 그리기 ─────────────────────────────────────
     * 조표 기호는 x=80 부터 시작해 14px 간격으로 배치
     * y좌표는 오선 위치 기반 (SHARP_Y / FLAT_Y 참조)
     * 이미지로 교체 시: 아래 블록을 <image> 태그 코드로 대체
     * ──────────────────────────────────────────────────────── */
    const g = document.createElementNS(NS, 'g');
    g.setAttribute('id', 'key-sig-grp');

    const isSharp = keySig.sharps.length > 0;
    const accList = isSharp ? keySig.sharps : keySig.flats;
    const yMap    = isSharp ? SHARP_Y : FLAT_Y;
    const sym     = isSharp ? '♯' : '♭';
    const startX  = 80;
    const stepX   = 14;

    accList.forEach((letter, i) => {
        const x = startX + i * stepX;
        const y = yMap[letter];
        const t = document.createElementNS(NS, 'text');
        t.setAttribute('x', String(x));
        /* 플랫 기호는 위쪽 기준점 사용으로 y를 조금 조정 */
        t.setAttribute('y', String(isSharp ? y + 5 : y + 7));
        t.setAttribute('font-size', '16');
        t.setAttribute('font-family', 'Georgia, serif');
        t.setAttribute('fill', '#333');
        t.setAttribute('text-anchor', 'middle');
        t.textContent = sym;
        g.appendChild(t);
    });

    svg.appendChild(g);
}

/* ── SVG 헬퍼 함수들 ──────────────────────────────────────────── */

/*
 * mk(tag, attrs): SVG 요소 생성 유틸리티 함수
 * Python의 헬퍼 함수와 동일한 개념
 * document.createElementNS: SVG 네임스페이스로 요소 생성
 * Object.entries: Python의 dict.items()와 동일
 */
function mk(tag, attrs) {
    const e = document.createElementNS(NS, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v); /* 속성 일괄 설정 */
    return e;
}

/*
 * initStaff(): 악보 오선지 초기화 (앱 시작 시 한 번만 실행)
 * SVG에 오선 5개 + 양쪽 세로선 + 음자리표를 그림
 */
function initStaff() {
    const svg = document.getElementById('staff-svg');
    /* STAFF_Y 배열을 순회하며 5개의 가로선을 그림 (Python의 for y in STAFF_Y: 와 동일) */
    STAFF_Y.forEach(y => svg.appendChild(mk('line', {
        x1: 22, y1: y, x2: 468, y2: y,       /* 가로선: x=22부터 x=468까지 */
        stroke: '#333', 'stroke-width': 1.5
    })));
    /* 왼쪽 세로선 */
    svg.appendChild(mk('line', { x1:22,  y1:55, x2:22,  y2:135, stroke:'#333', 'stroke-width':2 }));
    /* 오른쪽 세로선 */
    svg.appendChild(mk('line', { x1:468, y1:55, x2:468, y2:135, stroke:'#333', 'stroke-width':2 }));

    /* 음자리표는 drawClef()로 위임 (퀴즈 중 교체 가능하도록 분리) */
    drawClef('treble');
}

/*
 * drawClef(clef): SVG에 음자리표 기호를 그림
 * 기존 음자리표(id='clef-symbol')를 먼저 제거하고 새로 생성
 * - 'treble': 높은음자리표 𝄞
 * - 'bass'  : 낮은음자리표 𝄢
 */
function drawClef(clef) {
    const svg = document.getElementById('staff-svg');
    /* 기존 음자리표 요소 제거 */
    const old = document.getElementById('clef-symbol');
    if (old) old.remove();

    const t = document.createElementNS(NS, 'text');
    t.setAttribute('id', 'clef-symbol');
    t.setAttribute('fill', '#222');
    if (clef === 'bass') {
        /* 낮은음자리표: 𝄢 */
        t.setAttribute('x', '28');
        t.setAttribute('y', '100');
        t.setAttribute('font-size', '58');
        t.setAttribute('font-family', 'Georgia, serif');
        t.textContent = '𝄢';
    } else {
        /* 높은음자리표(기본): 𝄞 */
        t.setAttribute('x', '24');
        t.setAttribute('y', '152');
        t.setAttribute('font-size', '107');
        t.setAttribute('font-family', 'Georgia, "Times New Roman", serif');
        t.textContent = '𝄞';
    }
    svg.appendChild(t);
}

/*
 * drawNote(note): 악보에 음표 하나를 그림
 * 기존 음표(.ngrp 클래스)는 먼저 지우고 새로 그림
 */
function drawNote(note) {
    document.querySelectorAll('.ngrp').forEach(e => e.remove()); /* 이전 음표 모두 제거 */
    const svg = document.getElementById('staff-svg');
    const g = document.createElementNS(NS, 'g'); /* g: SVG 그룹 요소 (관련 요소를 묶음) */
    g.setAttribute('class', 'ngrp'); /* CSS 애니메이션 적용을 위해 클래스 설정 */

    const x = 280, y = note.y; /* 음표 머리의 중심 좌표 */

    /* 보조선 추가: C4(y=155)처럼 오선 밖에 있는 음표는 보조선이 필요 */
    if (y >= 155) g.appendChild(mk('line', {
        x1: x-19, y1: 155, x2: x+19, y2: 155, /* 음표 머리보다 좌우로 약간 넓게 */
        stroke: '#333', 'stroke-width': 1.5
    }));
    /* B5(y=35)처럼 오선 위에 있는 음표의 위쪽 보조선 */
    if (y <= 35) g.appendChild(mk('line', {
        x1: x-19, y1: 35, x2: x+19, y2: 35,
        stroke: '#333', 'stroke-width': 1.5
    }));

    /*
     * 임시표(♯ 또는 ♭) 그리기
     * 실제 악보 규칙: 조표에 이미 포함된 음(예: 사장조의 F#)은
     * 음표 앞에 기호를 붙이지 않음. 조표에 없는 음에만 임시표 표시.
     *
     * note.id[0]: 음이름의 첫 글자 = 알파벳 음명 (예: 'F#4' → 'F')
     */
    const noteLetter = note.id[0];
    const coveredByKeySig = currentKeySig && (
        (note.acc === 'sharp' && currentKeySig.sharps.includes(noteLetter)) ||
        (note.acc === 'flat'  && currentKeySig.flats.includes(noteLetter))
    );

    if (note.acc && !coveredByKeySig) {
        const sym = note.acc === 'sharp' ? '♯' : '♭'; /* 샵이면 ♯, 플랫이면 ♭ */
        const ay  = note.acc === 'flat'  ? y + 7 : y + 5; /* 플랫은 아래 기준, 샵은 중앙 기준 */
        const acc = document.createElementNS(NS, 'text');
        acc.setAttribute('x', String(x - 19)); /* 음표 머리 왼쪽에 배치 */
        acc.setAttribute('y', String(ay));
        acc.setAttribute('font-size', '17');
        acc.setAttribute('font-family', 'Georgia, serif');
        acc.setAttribute('fill', '#111');
        acc.setAttribute('text-anchor', 'middle'); /* 텍스트를 x좌표 기준으로 가운데 정렬 */
        acc.textContent = sym;
        g.appendChild(acc);
    }

    /* 음표 머리: 타원형 (약간 기울어진 모양) */
    g.appendChild(mk('ellipse', {
        cx: x, cy: y, rx: 9, ry: 6.5,      /* 중심(cx,cy), 가로반지름(rx), 세로반지름(ry) */
        fill: '#111',
        transform: `rotate(-15,${x},${y})`  /* (x,y)를 중심으로 -15도 회전 */
    }));

    /*
     * 음표 기둥(stem) 방향 결정:
     * 악보 관례상 가온선(B4, y=95) 아래 음표는 기둥이 위로,
     * 위 음표는 기둥이 아래로 향함
     */
    const up = y >= 95; /* y값이 클수록 아래쪽 → 하단 음표는 기둥 위로 */
    g.appendChild(mk('line', {
        x1: up ? x+8.5 : x-8.5,  /* 기둥 오른쪽(위로) 또는 왼쪽(아래로) 시작 */
        y1: up ? y-2   : y+2,
        x2: up ? x+8.5 : x-8.5,
        y2: up ? y-42  : y+42,   /* 42px 길이의 기둥 */
        stroke: '#111', 'stroke-width': 2
    }));

    svg.appendChild(g);
}

/* ── 피아노 건반 생성 ─────────────────────────────────────────── */

/*
 * buildPiano(clef): 피아노 건반 HTML 요소를 동적으로 생성
 * clef 인자에 따라 사용할 음표 데이터셋과 검은 건반 정의를 선택
 * - 'treble': 높은음자리표 — WHITE_NOTES(C4~B5), BLACK_KEY_DEFS
 * - 'bass'  : 낮은음자리표 — BASS_WHITE_NOTES(E2~B3), BLACK_KEY_DEFS_BASS
 * Python에서 for문으로 리스트 항목마다 위젯을 만드는 것과 유사
 */
function buildPiano(clef) {
    const piano = document.getElementById('piano');
    piano.innerHTML = ''; /* 기존 건반 초기화 (재생성을 위해 비움) */

    /* 음자리표에 따라 사용할 흰 건반 목록과 검은 건반 정의 선택 */
    const whites = (clef === 'bass') ? BASS_WHITE_NOTES : WHITE_NOTES;
    const blacks = (clef === 'bass') ? BLACK_KEY_DEFS_BASS : BLACK_KEY_DEFS;

    /* 피아노 전체 너비 = 흰 건반 수 × 흰 건반 너비 */
    piano.style.width = (whites.length * WHITE_W) + 'px';

    /* 흰 건반 생성 */
    whites.forEach((n, i) => {
        const k = document.createElement('div'); /* div 요소 생성 */
        k.className = 'key white';
        k.style.left = (i * WHITE_W) + 'px';    /* 절대 위치: 인덱스 × 건반 너비 */
        k.dataset.keyid = n.keyId;               /* data-keyid 속성 설정 */
        /* innerHTML: 내부 HTML을 문자열로 설정. 템플릿 리터럴 사용 */
        k.innerHTML = `<span class="note-id">${n.id}</span>`;
        /* addEventListener: 이벤트 리스너 등록 (Python의 button.bind('click', func)와 유사) */
        k.addEventListener('click', () => { playKeyClick(n.keyId); answer(n.keyId, k); });
        piano.appendChild(k); /* 피아노 컨테이너에 건반 추가 */
    });

    /* 검은 건반 생성 */
    blacks.forEach(bk => {
        const k = document.createElement('div');
        k.className = 'key black';
        /* 검은 건반 위치: 왼쪽 흰 건반 위치 + 흰 건반 너비 - 검은 건반 너비의 절반 */
        k.style.left = (bk.whiteLeft * WHITE_W + WHITE_W - Math.floor(BLACK_W / 2)) + 'px';
        k.dataset.keyid = bk.keyId;
        k.innerHTML = ''; /* 검은 건반은 텍스트 없음 */
        k.addEventListener('click', () => { playKeyClick(bk.keyId); answer(bk.keyId, k); });
        piano.appendChild(k);
    });
}

/* ── 화면 전환 ────────────────────────────────────────────────── */

/*
 * showScreen(id): 화면 전환 함수
 * 모든 .screen에서 'active' 클래스 제거 후 목표 화면에만 추가
 * Python의 tkinter에서 frame.tkraise()와 유사한 개념
 */
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

/* ── 퀴즈 로직 ────────────────────────────────────────────────── */

/* startQuiz(): 퀴즈 시작 - 모든 상태 초기화 후 첫 문제 출제 */
function startQuiz() {
    /* 난이도에 해당하는 조성 목록에서 랜덤으로 하나 선택 */
    const keySigPool = KEY_SIGNATURES[settingDifficulty];
    currentKeySig = keySigPool[Math.floor(Math.random() * keySigPool.length)];
    /* notePool과 음자리표는 next() 첫 호출 시 결정됨 */

    sc = 0; tot = 0; ok = true; combo = 0; maxCombo = 0;
    /*
     * retryWrongMode: 직전 퀴즈의 wrongMap에서 틀린 음표 목록을 재구성해 가중치에 사용
     * Object.keys(wrongMap): Python의 list(wrongMap.keys())와 동일
     * 일반 시작이면 wrongNoteIds도 초기화
     */
    wrongNoteIds = retryWrongMode ? Object.keys(wrongMap) : [];
    wrongMap = {};
    /* textContent: 요소의 텍스트 내용을 변경 */
    document.getElementById('sc').textContent  = 0;
    document.getElementById('tot').textContent = 0;
    document.getElementById('prog-tot').textContent = totalQ;
    document.getElementById('prog-cur').textContent = 0;
    renderCombo();
    showScreen('screen-quiz');
    /* 화면 전환 후 조표 및 힌트 렌더링 */
    renderKeySignature(currentKeySig);
    quizStartTime = Date.now(); /* 현재 시각(밀리초) 기록. Python의 time.time()과 유사 */
    next();
}

/* next(): 다음 문제 출제 */
function next() {
    ok = true; /* 다시 입력 받을 수 있도록 */

    /*
     * 음자리표 결정:
     * - 'random': 50% 확률로 treble/bass 중 랜덤 선택
     * - 'treble'/'bass': 설정값으로 고정
     */
    if (settingClef === 'random') {
        activeClef = Math.random() < 0.5 ? 'treble' : 'bass';
    } else {
        activeClef = settingClef;
    }
    /* 음자리표 갱신 및 건반 재생성 */
    drawClef(activeClef);
    buildPiano(activeClef);
    scalePiano(); /* 건반 재생성 후 스케일 재계산 */
    /* 현재 음자리표에 맞는 음표 풀 갱신 */
    notePool = buildNotePool(currentKeySig, activeClef);

    const fb = document.getElementById('fb');
    fb.textContent = '';          /* 피드백 메시지 초기화 */
    fb.className = 'feedback';    /* 색상 클래스 제거 */
    /* 모든 건반에서 정답/오답 색상 클래스 제거 */
    document.querySelectorAll('.key').forEach(k => k.classList.remove('correct', 'wrong'));
    /*
     * 음표 선택: retryWrongMode가 true면 틀린 음표에 3배 가중치 부여
     * Python으로 표현하면:
     *   pool = []
     *   for note in notePool:
     *       w = 3 if note.id in wrongNoteIds else 1
     *       pool.extend([note] * w)
     *   cur = random.choice(pool)
     */
    if (retryWrongMode && wrongNoteIds.length > 0) {
        const weightedPool = [];
        notePool.forEach(note => {
            const w = wrongNoteIds.includes(note.id) ? 3 : 1; /* 틀린 음표: 3배, 나머지: 1배 */
            for (let i = 0; i < w; i++) weightedPool.push(note);
        });
        cur = weightedPool[Math.floor(Math.random() * weightedPool.length)];
    } else {
        /* 일반 모드: 모든 음표 동일 확률 */
        cur = notePool[Math.floor(Math.random() * notePool.length)];
    }
    drawNote(cur);      /* 선택된 음표를 악보에 그림 */
    playNote(cur.id);   /* 해당 음 자동 재생 */
    startTimer();       /* 타이머 시작 */
}

/*
 * answer(keyId, keyEl): 사용자가 건반을 클릭했을 때 호출
 * keyId: 클릭한 건반의 ID
 * keyEl: 클릭한 건반의 DOM 요소 (시각적 피드백을 위해 필요)
 */
function answer(keyId, keyEl) {
    if (!ok) return; /* 이미 처리 중이면 무시 (중복 클릭 방지) */
    ok = false;
    stopTimer();
    document.getElementById('tot').textContent = ++tot; /* ++tot: tot를 1 증가시킨 값 사용 */

    const fb = document.getElementById('fb');
    if (keyId === cur.keyId) {
        /* 정답인 경우 */
        document.getElementById('sc').textContent = ++sc;
        keyEl.classList.add('correct');  /* 클릭한 건반 초록색으로 */
        combo++;
        if (combo > maxCombo) maxCombo = combo;
        fb.textContent = '✓ 정답입니다!';
        fb.className = 'feedback correct';
        playEffect('correct');
    } else {
        /* 오답인 경우 */
        keyEl.classList.add('wrong');    /* 클릭한 건반 빨간색으로 */
        /* 실제 정답 건반도 초록색으로 표시 (정답이 어디인지 알려줌) */
        document.querySelector(`[data-keyid="${cur.keyId}"]`).classList.add('correct');
        /* wrongMap에 해당 음 틀린 횟수 +1 (없으면 0으로 초기화 후 +1) */
        wrongMap[cur.id] = (wrongMap[cur.id] || 0) + 1;
        /* 틀린 음표 id 누적 (이미 있으면 추가 안 함) */
        if (!wrongNoteIds.includes(cur.id)) wrongNoteIds.push(cur.id);
        combo = 0;
        fb.textContent = `✗ 오답! 정답은 ${cur.id}`;
        fb.className = 'feedback wrong';
        playEffect('wrong');
    }
    renderCombo();
    afterAnswer();
}

/*
 * afterAnswer(): 답변 처리 후 공통 로직
 * setTimeout: 지정 ms 후 함수 한 번 실행. Python의 threading.Timer(1.5, func).start()와 유사
 */
function afterAnswer() {
    document.getElementById('prog-cur').textContent = tot;
    if (tot >= totalQ) {
        setTimeout(showResult, 1500); /* 1.5초 후 결과 화면으로 */
    } else {
        setTimeout(next, 1500);       /* 1.5초 후 다음 문제 */
    }
}

/* ── 결과 화면 ────────────────────────────────────────────────── */

/* showResult(): 결과 화면 표시 */
function showResult() {
    stopTimer();
    /* Date.now(): 현재 시각(ms). 퀴즈 시작 시각과의 차이를 초로 변환 */
    const elapsed = Math.round((Date.now() - quizStartTime) / 1000);
    const rate    = Math.round(sc / totalQ * 100); /* 정답률 (%) */

    /* 결과 화면의 각 요소에 값 설정 */
    document.getElementById('res-sc').textContent    = sc;
    document.getElementById('res-tot').textContent   = totalQ;
    document.getElementById('res-rate').textContent  = rate + '%';
    document.getElementById('res-combo').textContent = maxCombo;
    document.getElementById('res-time').textContent  = elapsed + '초';

    const list   = document.getElementById('wrong-list');
    list.innerHTML = ''; /* 이전 내용 초기화 */

    /*
     * Object.entries(wrongMap): Python의 wrongMap.items()와 동일
     * sort((a, b) => b[1] - a[1]): 틀린 횟수 내림차순 정렬
     *   (Python의 sorted(items, key=lambda x: -x[1])와 동일)
     */
    const wrongs = Object.entries(wrongMap).sort((a, b) => b[1] - a[1]);

    if (wrongs.length === 0) {
        list.innerHTML = '<div class="no-wrong">🎉 오답이 없습니다!</div>';
    } else {
        wrongs.forEach(([noteId, count]) => {
            const item = document.createElement('div');
            item.className = 'wrong-item';
            item.innerHTML = `<span class="note-name">${noteId}</span>
                              <span class="wrong-count">${count}회 틀림</span>`;
            list.appendChild(item);
        });
    }

    /* ── 최고기록 배지 업데이트 ─────────────────────────────────── */
    updateBestRecord(sc, totalQ, rate);

    /* ── 틀린 문제 재출제 버튼 표시 여부 ────────────────────────── */
    /* wrongMap: 이 퀴즈에서 틀린 음이 있으면 버튼 표시 */
    document.getElementById('retry-wrong-btn').style.display =
        (wrongs.length > 0) ? '' : 'none';

    /* ── 재출제 모드 및 틀린 음표 목록 초기화 ────────────────────── */
    retryWrongMode = false;
    wrongNoteIds   = [];

    showScreen('screen-result');
}

/* ── 최고기록 (localStorage) ─────────────────────────────────── */

/*
 * updateBestRecord(score, total, pct): 이번 퀴즈 결과를 localStorage에 저장하고
 * 결과 화면의 배지를 갱신한다.
 * - 저장 키: 'musicQuizBestRecords'
 * - 난이도별 독립 저장 (settingDifficulty 기준)
 * - 정답률(pct)이 기존보다 높을 때만 갱신 (같으면 갱신 안 함)
 */
function updateBestRecord(score, total, pct) {
    const STORAGE_KEY = 'musicQuizBestRecords';
    const badge = document.getElementById('best-record-badge');

    /* localStorage.getItem: 저장된 JSON 문자열 읽기. 없으면 null 반환 */
    const raw     = localStorage.getItem(STORAGE_KEY);
    /* JSON.parse: 문자열 → 객체 변환. Python의 json.loads()와 동일 */
    const records = raw ? JSON.parse(raw) : {};
    /*
     * 저장 키: 난이도_음자리표 형태 (예: 'beginner_treble', 'intermediate_bass', 'advanced_random')
     * 난이도와 음자리표 조합별로 최고기록을 독립 관리
     */
    const recordKey = `${settingDifficulty}_${settingClef}`;
    const prev      = records[recordKey]; /* 이 난이도+음자리표 조합의 기존 최고기록 */

    /* 날짜 문자열 생성: 'YYYY-MM-DD' 형식 */
    const today = new Date().toLocaleDateString('ko-KR',
        { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\. /g, '-').replace('.', '');

    if (!prev) {
        /* 해당 난이도+음자리표 첫 기록 */
        records[recordKey] = { score, total, pct, date: today };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
        badge.textContent = '🏆 첫 기록 달성!';
        badge.className = 'best-record-badge new-record';
    } else if (pct > prev.pct) {
        /* 신기록 달성 */
        records[recordKey] = { score, total, pct, date: today };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
        badge.textContent = '🏆 신기록!';
        badge.className = 'best-record-badge new-record';
    } else {
        /* 기존 최고기록 표시 */
        badge.textContent = `최고기록: ${prev.score} / ${prev.total} (${prev.pct}%)`;
        badge.className = 'best-record-badge prev-record';
    }
}

/* ── 옵션 버튼 그룹 설정 ──────────────────────────────────────── */

/*
 * setupOptBtns(groupId, onChange): 라디오 버튼처럼 동작하는 옵션 버튼 그룹 설정
 * groupId: 그룹 컨테이너의 id
 * onChange: 버튼 클릭 시 실행할 콜백 함수 (Python의 고차 함수 개념)
 */
function setupOptBtns(groupId, onChange) {
    const group = document.getElementById(groupId);
    group.querySelectorAll('.opt-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            /* 같은 그룹의 모든 버튼에서 'active' 제거 */
            group.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); /* 클릭된 버튼에만 'active' 추가 */
            onChange(btn.dataset);       /* 버튼의 data-* 속성들을 객체로 전달 */
        });
    });
}

/* 문제 수 버튼 그룹: data-q 값을 읽어 totalQ 변수 업데이트 */
setupOptBtns('q-btns', ({ q })          => { totalQ            = parseInt(q,   10); }); /* parseInt: 문자열→정수 변환 */
/* 제한 시간 버튼 그룹: data-sec 값을 읽어 settingSec 변수 업데이트 */
setupOptBtns('t-btns', ({ sec })        => { settingSec         = parseInt(sec, 10); });
/* 난이도 버튼 그룹: data-diff 값을 읽어 settingDifficulty 변수 업데이트 */
setupOptBtns('d-btns', ({ diff })       => { settingDifficulty  = diff; });
/* 음자리표 버튼 그룹: data-clef 값을 읽어 settingClef 변수 업데이트 */
setupOptBtns('clef-btns', ({ clef })    => { settingClef        = clef; });
/* 음표 소리 버튼 그룹 */
setupOptBtns('ns-btns', ({ notesound }) => { settingNoteSound   = (notesound === 'on'); });
/* 효과음 버튼 그룹 */
setupOptBtns('fx-btns', ({ effect })    => { settingEffect      = (effect    === 'on'); });


/* 시작하기 버튼 클릭 이벤트 */
document.getElementById('start-btn').addEventListener('click', startQuiz);
/* 처음으로 돌아가기 버튼 클릭 이벤트 */
document.getElementById('restart-btn').addEventListener('click', () => showScreen('screen-start'));
/*
 * 약점 집중 모드 버튼:
 * retryWrongMode = true 로 설정 후 startQuiz() 호출
 * startQuiz() 안에서 wrongMap(직전 퀴즈 오답)으로 wrongNoteIds를 재구성해 가중치에 사용
 */
document.getElementById('retry-wrong-btn').addEventListener('click', () => {
    retryWrongMode = true;
    startQuiz();
});

/* ── Web Audio API ────────────────────────────────────────────── */

/*
 * AudioContext: 브라우저 오디오 엔진의 진입점
 * 브라우저 자동재생 정책상 사용자 첫 상호작용(클릭 등) 이후에만 생성 가능
 * 따라서 페이지 로드 시가 아니라 첫 사용 시점에 lazily 생성 (getAudioCtx 참고)
 */
let audioCtx = null;

function getAudioCtx() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    /* 모바일에서 suspended 상태일 수 있으므로 resume 호출 */
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
}

/*
 * 표준 주파수 테이블 (평균율, A4 = 440 Hz 기준)
 * 계산식: freq = 440 × 2^((MIDI번호 - 69) / 12)
 * 샵(#)으로 통일. 플랫(♭) 이명동음은 아래 ENHARMONIC으로 변환
 */
const NOTE_FREQ = {
    /* 낮은음자리표 음역 (E2~B3) */
    'E2' : 82.41, 'F2' : 87.31, 'F#2': 92.50,
    'G2' : 98.00, 'G#2':103.83, 'A2' :110.00,
    'A#2':116.54, 'B2' :123.47,
    'C3' :130.81, 'C#3':138.59, 'D3' :146.83,
    'D#3':155.56, 'E3' :164.81, 'F3' :174.61,
    'F#3':185.00, 'G3' :196.00, 'G#3':207.65,
    'A3' :220.00, 'A#3':233.08, 'B3' :246.94,
    /* 높은음자리표 음역 (C4~B5) */
    'C4' :261.63, 'C#4':277.18, 'D4' :293.66, 'D#4':311.13,
    'E4' :329.63, 'F4' :349.23, 'F#4':369.99, 'G4' :392.00,
    'G#4':415.30, 'A4' :440.00, 'A#4':466.16, 'B4' :493.88,
    'C5' :523.25, 'C#5':554.37, 'D5' :587.33, 'D#5':622.25,
    'E5' :659.25, 'F5' :698.46, 'F#5':739.99, 'G5' :783.99,
    'G#5':830.61, 'A5' :880.00, 'A#5':932.33, 'B5' :987.77
};

/* 이명동음(같은 건반, 다른 이름): 플랫 표기 → 샵 표기로 정규화 */
const ENHARMONIC = {
    'D♭':'C#', 'E♭':'D#', 'G♭':'F#', 'A♭':'G#', 'B♭':'A#'
};

/*
 * 건반 keyId → 주파수 (피아노 클릭 시 사용)
 * 검은 건반 keyId(Cs4, Ds4 …)를 주파수에 직접 매핑
 */
const KEYID_FREQ = {
    /* 낮은음자리표 흰 건반 (E2~B3) */
    'E2' : 82.41, 'F2' : 87.31, 'G2' : 98.00,
    'A2' :110.00, 'B2' :123.47, 'C3' :130.81,
    'D3' :146.83, 'E3' :164.81, 'F3' :174.61,
    'G3' :196.00, 'A3' :220.00, 'B3' :246.94,
    /* 낮은음자리표 검은 건반 */
    'Fs2': 92.50, 'Gs2':103.83, 'As2':116.54,
    'Cs3':138.59, 'Ds3':155.56, 'Fs3':185.00,
    'Gs3':207.65, 'As3':233.08,
    /* 높은음자리표 흰 건반 (C4~B5) */
    'C4' :261.63, 'D4' :293.66, 'E4' :329.63, 'F4' :349.23,
    'G4' :392.00, 'A4' :440.00, 'B4' :493.88,
    'C5' :523.25, 'D5' :587.33, 'E5' :659.25, 'F5' :698.46,
    'G5' :783.99, 'A5' :880.00, 'B5' :987.77,
    /* 높은음자리표 검은 건반 */
    'Cs4':277.18, 'Ds4':311.13, 'Fs4':369.99, 'Gs4':415.30, 'As4':466.16,
    'Cs5':554.37, 'Ds5':622.25, 'Fs5':739.99, 'Gs5':830.61, 'As5':932.33
};

/* noteId('D♭4', 'F#5' 등) → 주파수. 플랫 표기도 ENHARMONIC으로 변환 */
function noteNameToFreq(noteId) {
    const oct  = noteId[noteId.length - 1];            /* 마지막 글자 = 옥타브 숫자 */
    const name = noteId.slice(0, -1);                  /* 나머지 = 음이름 (예: 'D♭') */
    const canonical = (ENHARMONIC[name] || name) + oct; /* 정규화 후 옥타브 재결합 */
    return NOTE_FREQ[canonical] || null;
}

/*
 * ★ playNote(noteId): 악보 음표 재생
 * ──────────────────────────────────────────────────────────────
 * 나중에 실제 음원으로 교체할 때는 이 함수 본문만 바꾸면 됨:
 *   const audio = new Audio(`sounds/${noteId}.mp3`);
 *   audio.play();
 * ──────────────────────────────────────────────────────────────
 */
function playNote(noteId) {
    if (!settingNoteSound) return; /* 음표 소리 OFF면 재생 안 함 */
    const freq = noteNameToFreq(noteId);
    if (!freq) return;
    _pianoTone(freq, 0.9, 1.1); /* 음표: 비교적 긴 감쇠 */
}

/*
 * ★ playKeyClick(keyId): 피아노 건반 클릭 시 음 재생
 * ──────────────────────────────────────────────────────────────
 * 교체 시: 위 playNote와 동일한 방식으로 음원 파일 사용
 * ──────────────────────────────────────────────────────────────
 */
function playKeyClick(keyId) {
    if (!settingNoteSound) return; /* 음표 소리 OFF면 재생 안 함 */
    const freq = KEYID_FREQ[keyId];
    if (!freq) return;
    _pianoTone(freq, 0.5, 0.65); /* 클릭음: 짧고 경쾌하게 */
}

/*
 * ★ playEffect(type): 정답/오답 효과음
 * type: 'correct' | 'wrong'
 * ──────────────────────────────────────────────────────────────
 * 교체 시:
 *   const sfx = new Audio(type === 'correct' ? 'sounds/correct.mp3' : 'sounds/wrong.mp3');
 *   sfx.play();
 * ──────────────────────────────────────────────────────────────
 */
function playEffect(type) {
    if (!settingEffect) return; /* 효과음 OFF면 재생 안 함 */
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    if (type === 'correct') {
        /* 정답: 고주파(1800Hz) 사인파 단발 알림음 "띵~" — 음표와 명확히 구별 */
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1800, now);
        gain.gain.setValueAtTime(0.35, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        osc.start(now);
        osc.stop(now + 0.28);
    } else {
        /* 오답: 저주파(120Hz) 사각파 버저음 "부~" — 음표와 명확히 구별 */
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'square';
        osc.frequency.setValueAtTime(120, now);
        gain.gain.setValueAtTime(0.25, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        osc.start(now);
        osc.stop(now + 0.28);
    }
}

/*
 * _pianoTone(freq, decay, duration, startAt?):
 * sine 오실레이터 + 지수 감쇠 GainNode로 피아노 느낌 구현
 * - 어택: 즉시 최대 볼륨
 * - 감쇠(Decay): exponentialRamp → 피아노 현의 자연스러운 소멸
 * 언더스코어(_) 접두사: 이 파일 내부에서만 사용하는 함수 표시 (Python 관례와 동일)
 */
function _pianoTone(freq, decay, duration, startAt) {
    const ctx  = getAudioCtx();
    const t    = (startAt !== undefined) ? startAt : ctx.currentTime;
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.type = 'sine';                                    /* 순수 사인파: 맑고 부드러운 음색 */
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(0.45, t);                    /* 어택: 볼륨 0.45 로 시작 */
    gain.gain.exponentialRampToValueAtTime(0.001, t + decay); /* 지수 감쇠 → 피아노 울림 */

    osc.start(t);
    osc.stop(t + duration);
}

/* ── 피아노 반응형 스케일 ─────────────────────────────────────── */

/*
 * scalePiano(): 피아노 건반을 카드 너비에 맞게 가로 스케일 조정
 * 건반 실제 너비(흰건반 14개 × WHITE_W)가 카드보다 넓으면 축소
 * transform: scaleX() 로 클릭 좌표는 변하지 않으므로 answer() 동작에 영향 없음
 */
function scalePiano() {
    const piano = document.getElementById('piano');
    const cardW = document.querySelector('.card')
                  ? document.querySelector('.card').offsetWidth
                  : window.innerWidth * 0.96;
    const pianoNaturalW = WHITE_W * 14;
    const scale = Math.min(1, cardW / pianoNaturalW);

    piano.style.transformOrigin = 'top center';  /* 가운데 기준으로 축소 */
    piano.style.transform = `scaleX(${scale})`;
    piano.style.height = (145 * scale) + 'px';

    /* 피아노 컨테이너를 가운데 정렬 */
    piano.style.display = 'flex';
    piano.style.justifyContent = 'center';
}

/* 창 크기가 바뀔 때마다 피아노 스케일 재계산 */
window.addEventListener('resize', scalePiano);

/* ── 초기화 ──────────────────────────────────────────────────── */
/*
 * 페이지 로드 시 즉시 실행 (Python의 if __name__ == '__main__': 아래 코드와 유사)
 * initStaff(): 악보 오선지 그리기
 * buildPiano(): 피아노 건반 HTML 생성
 */
initStaff();
buildPiano('treble');
scalePiano();
</script>
